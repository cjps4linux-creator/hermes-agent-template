name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest pytest-cov pyyaml
      - run: pytest -q

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Audit Python dependencies (blocks on known vulnerabilities)
        run: |
          pip install pip-audit
          reqs=$(find . -name 'requirements*.txt' -not -path '*/node_modules/*' | head)
          if [ -n "$reqs" ]; then
            pip-audit $reqs --fail-on high --desc on
          else
            echo "No Python dependency manifests found — nothing to audit."
          fi

  docs-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: |
          markdownlint README.md LAUNCH.md VERIFICATION.md SECURITY.md docs/*.md 2>/dev/null || true
